aid: rentvine
name: Rentvine
description: >
  Rentvine is a modern property management platform offering a fully open RESTful
  API for managing properties, leases, tenants, maintenance requests, financials,
  and owner portals. The API provides real-time data access and supports custom
  integrations, workflow automation, and third-party software connectivity. API
  access is included with all subscriptions at no additional cost, with no usage
  restrictions or rate limit quotas published.
